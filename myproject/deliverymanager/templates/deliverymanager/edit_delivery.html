<!DOCTYPE html>
<html>

<head>
    <title>Edit Delivery</title>
</head>

<body>
    <h1>Edit Delivery</h1>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="address" value="{{ delivery.address }}" required>
        <button type="submit">Save</button>
    </form>

    <a href="{% url 'dashboard' %}">Cancel</a>
</body>

</html>
