<!DOCTYPE html>
<html>
<head>
    <title>Delivery Queue</title>
</head>
<body>
    <h1>Unassigned Deliveries</h1>

    {% if deliveries %}
        <ul>
            {% for delivery in deliveries %}
                <li>
                    {{ delivery.address }}
                    
                    <form method="post" action="{% url 'remove_delivery' delivery.id %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit">Delete</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No unassigned deliveries.</p>
    {% endif %}

    <a href="{% url 'add_delivery' %}">Add another delivery</a>
</body>
</html>
